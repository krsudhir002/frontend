name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build test image and run tests
        run: docker build -t frontend-test -f Dockerfile.dev .
      - run: docker run -e CI=true frontend-test npm run test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: zip -r deploy.zip . -x ".git/*" "node_modules/*" "build/*" "docker-compose.yml" "Dockerfile.dev" ".github/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: frontend
          environment_name: frontend-prod
          region: ap-south-1
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip